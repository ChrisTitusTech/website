baseURL = "https://christitus.com/"
title = "Chris Titus Tech | Tech Content Creator"
languageCode = "en-us"
summaryLength = 70
enableGitInfo = true

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      attribute = true
      autoHeadingID = true
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true

[markup.highlight]
codeFences = true
guessSyntax = true
noClasses = false

[params]
defaultTheme = "dark"
logo = "images/navlogo.webp"
logoWidth = 248
logoHeight = 50
favicon = "images/favicon.png"
author = "Chris Titus"
twitter = "@christitustech"
description = "Having Fun with Technology"
og_image = "images/bannerbackground.webp"
mainSections = ["posts"]
search = true
header_search_layout = "expanded"
menu_align = "center"
sidebar = "right"
code_copy_button = true

[params.variables]
primary_color = "#47c4f1"
secondary_color = "#47c4f1"
text_color = "#212529"
text_color_dark = "#000000"
body_color = "#ffffff"
border_color = "#dee2e6"
black = "#212529"
white = "#ffffff"
light = "#f8f9fa"
primary_font = "PT Sans:wght@400;700"
icon_font = "Font Awesome 6 Free"

[params.widgets]
sidebar = ["toc", "google-ad"]

[params.images]
  featured = true
  share = true
  formats = ["webp", "jpg", "png"]

[mediaTypes]
  [mediaTypes."image/webp"]
    suffixes = ["webp"]

[outputFormats]
  [outputFormats.WEBP]
    mediaType = "image/webp"
    isPlainText = false
    isHTML = false

# CSS and JS plugins are managed directly in layouts/partials/head.html and layouts/partials/footer.html

[[params.social]]
name = "YouTube"
link = "https://youtube.com/c/ChrisTitusTech"
