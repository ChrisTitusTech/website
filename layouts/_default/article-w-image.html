<article class="article-overlapped-list row align-items-center mb-2">
  {{ if .Params.image }}
  <div class="col-md-6">
    <!--a href="{{ .Permalink }}"><img loading="lazy" class="w-100" src="{{ .Params.image | absURL }}" alt="post-image"></a-->
    <a href="{{ .Permalink }}">
      <img src="/cdn-cgi/image/width=300,height=169,fit=cover,format=auto/{{ .Params.image }}"
           srcset="/cdn-cgi/image/width=300,height=169,fit=cover,format=auto/{{ .Params.image }} 1x,
                   /cdn-cgi/image/width=600,height=338,fit=cover,format=auto/{{ .Params.image }} 2x"
           width="300" height="169"
           loading="lazy"
           decoding="async"
           alt="{{ .Title | plainify }}"
           class="rounded shadow"
           onerror="this.onerror=null;this.removeAttribute('srcset');this.src='{{ .Params.image | absURL }}'">
    </a>
  </div>
  {{ end }}
  <div class="col-md-6">
    <div class="card-block">
      <h2 class="h4"><a class="post-title" href="{{ .Permalink }}">{{ .Title | markdownify }}</a></h2>
      <p>{{.Summary | truncate 100}}</p>
      <div class="mt-3 post-meta">
        {{ .PublishDate.Format "Jan 2, 2006" }}
        {{ if .Params.Categories }}
          <span class="mx-1">|</span>
          {{ range .Params.Categories }}
          <span class="post-category"><a href="{{ `categories/` | absLangURL }}{{ . | urlize | lower }}">{{ . | title }}</a></span>
          {{ end }}
        {{ end }}
      </div>
    </div>
  </div>
</article>
