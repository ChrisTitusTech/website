# InspIRCd configuration — irc.christitus.com
#
# Place this file at infra/irc/inspircd/conf/inspircd.conf
# and it will be mounted read-only into the container.
#
# TLS certificates: Caddy (or certbot) writes certs to infra/irc/certs/
#   irc.christitus.com.crt  — full chain
#   irc.christitus.com.key  — private key
# The docker-compose.yml mounts that directory to /inspircd/cert/

<server name="irc.christitus.com"
        description="ChrisTitusTech IRC"
        network="ChrisTitusTech">

<admin name="Chris Titus"
       nick="ChrisTitus"
       email="admin@christitus.com">

# Bind plain IRC — internal Docker network only (The Lounge connects here)
<bind address="0.0.0.0"
      port="6667"
      type="clients">

# Bind TLS IRC — exposed to the internet for native IRC clients
<bind address="0.0.0.0"
      port="6697"
      type="clients"
      ssl="gnutls">

<gnutls certfile="/inspircd/cert/irc.christitus.com.crt"
        keyfile="/inspircd/cert/irc.christitus.com.key">

# Allow connections from anywhere; rate-limit with the throttle module
<connect name="main"
         allow="*"
         maxchans="25"
         timeout="10"
         pingfreq="120"
         hardsendq="1M"
         softsendq="8192"
         recvq="8192"
         threshold="10"
         flood="30"
         sendq="262144"
         localmax="50"
         globalmax="250"
         useident="no"
         limit="5000">

# IRC Operator (admin) — change the password hash below
# Generate: inspircd --mkpasswd hmac-sha256 yourpassword
<oper name="ChrisTitus"
      password="REPLACE_WITH_MKPASSWD_HASH"
      host="*@*"
      type="NetAdmin">

<type name="NetAdmin"
      classes="OperChat BanControl HostCloak Shutdown"
      vhost="staff.christitus.com"
      snomasks="*"
      modes="+s">

<class name="OperChat"    commands="WALLOPS GLOBOPS" privs="">
<class name="BanControl"  commands="KILL GLINE KLINE ZLINE QLINE ELINE TLINE RLINE CHECK NICKLOCK SHUN CLONES JUMPSERVER SANICK" privs="">
<class name="HostCloak"   commands="SETHOST SETIDENT CHGNAME CHGHOST CHGIDENT" privs="">
<class name="Shutdown"    commands="DIE RESTART REHASH LOADMODULE UNLOADMODULE RELOADMODULE GUNLOADMODULE GRELOADMODULE" privs="">

# Default channels
<channel name="#general"    topic="ChrisTitusTech General Chat">
<channel name="#tech"       topic="Tech discussion and help">
<channel name="#offtopic"   topic="Anything goes (keep it civil)">

# Core modules
<module name="cloaking">
<cloak mode="half"
       key="REPLACE_WITH_RANDOM_32_CHAR_KEY"
       prefix="christitus">

<module name="spanningtree">
<module name="ssl_gnutls">
<module name="cap">
<module name="sasl">
<module name="services_account">
<module name="ircv3">
<module name="ircv3_capnotify">
<module name="ircv3_chghost">
<module name="ircv3_ctctags">
<module name="ircv3_echomessage">
<module name="ircv3_labeledresponse">
<module name="ircv3_msgid">
<module name="ircv3_servertime">
<module name="callerid">
<module name="chancreate">
<module name="chanhistory">
<chanhistory maxlines="100" enableumode="yes">
<module name="chanlog">
<module name="conn_waitpong">
<module name="dnsbl">
<module name="hostchange">
<module name="invite">
<module name="joinflood">
<module name="knock">
<module name="messageflood">
<module name="noctcp">
<module name="operjoin">
<operjoin channel="#opers">
<module name="operutf8">
<module name="rline">
<module name="securelist">
<module name="seenicks">
<module name="serverban">
<module name="sethost">
<module name="showwhois">
<module name="silence">
<module name="sslinfo">
<module name="stripcolor">
<module name="swhois">
<module name="timedbans">
<module name="topiclock">
<module name="watch">

<log method="file" type="* -USERINPUT -USEROUTPUT" level="default" target="/inspircd/logs/inspircd.log">
